name: Daily Article Update

on:
  schedule:
    # 日本時間 07:00 (UTC 22:00) と 19:00 (UTC 10:00) に自動実行
    - cron: '0 10,22 * * *'
  workflow_dispatch: # 手動実行ボタンを表示

# GitHub Actionsにファイルの書き込み権限を与える設定
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-genai requests

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_article.py

      - name: Commit and Push
        run: |
          git config --global user.name "GEO-LECT-BOT"
          git config --global user.email "bot@example.com"
          git add .
          # 変更がある場合のみコミットしてプッシュする（エラー防止）
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Update: Intelligence & Market Data" && git push)
