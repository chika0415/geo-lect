name: Daily Article Update

on:
  schedule:
    - cron: '0 10,22 * * *' # 日本時間 07:00 と 19:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-genai requests

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_article.py

      - name: Commit and Push
        run: |
          git config --global user.name "GEO-LECT-BOT"
          git config --global user.email "bot@example.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Update: Intelligence & Market Data" && git push)
